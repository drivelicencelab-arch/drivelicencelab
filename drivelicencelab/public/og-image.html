<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<style>
  body{margin:0;width:1200px;height:630px;background:#0D1117;font-family:'Arial',sans-serif;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .card{width:100%;height:100%;background:linear-gradient(135deg,#0D2137,#0D1117);display:flex;align-items:center;justify-content:center;padding:60px;position:relative;}
  .glow{position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(0,201,200,0.2),transparent 70%);pointer-events:none;}
  .content{text-align:center;color:#fff;}
  h1{font-size:72px;font-weight:900;margin:0;color:#fff;letter-spacing:-2px;}
  p{font-size:28px;color:rgba(255,255,255,0.7);margin:16px 0 40px;}
  .stats{display:flex;gap:60px;justify-content:center;}
  .stat{text-align:center;}
  .stat-val{font-size:40px;font-weight:900;color:#00C9C8;}
  .stat-label{font-size:16px;color:rgba(255,255,255,0.6);margin-top:4px;}
  .badge{display:inline-block;background:rgba(0,201,200,0.2);border:1px solid rgba(0,201,200,0.4);border-radius:30px;padding:8px 24px;font-size:18px;color:#00C9C8;margin-bottom:20px;font-weight:700;}
</style>
</head>
<body>
<div class="card">
  <div class="glow"></div>
  <div class="content">
    <div class="badge">🚗 SA K53 Driver Training Platform</div>
    <h1>DriveLicenceLab</h1>
    <p>Earn your SA driver's licence with confidence</p>
    <div class="stats">
      <div class="stat"><div class="stat-val">92%</div><div class="stat-label">Pass Rate</div></div>
      <div class="stat"><div class="stat-val">4 Wks</div><div class="stat-label">To Licence</div></div>
      <div class="stat"><div class="stat-val">24/7</div><div class="stat-label">AI Tutor</div></div>
    </div>
  </div>
</div>
</body>
</html>
